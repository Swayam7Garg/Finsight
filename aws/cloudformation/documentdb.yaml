AWSTemplateFormatVersion: '2010-09-09'
Description: WealthWise DocumentDB cluster (MongoDB-compatible)

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for DocumentDB

  ECSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: ECS security group allowed to connect to DocumentDB

  MasterUsername:
    Type: String
    Default: wealthwise
    MinLength: 1
    MaxLength: 63

  MasterUserPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 100

  InstanceClass:
    Type: String
    Default: db.r6g.large
    AllowedValues:
      - db.t4g.medium
      - db.r6g.medium
      - db.r6g.large
      - db.r6g.xlarge

  EnvironmentName:
    Type: String
    Default: production

Resources:
  DocumentDBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow access to DocumentDB from ECS
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 27017
          ToPort: 27017
          SourceSecurityGroupId: !Ref ECSSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-documentdb-sg

  DocumentDBSubnetGroup:
    Type: AWS::DocDB::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for WealthWise DocumentDB
      SubnetIds: !Ref PrivateSubnetIds
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-documentdb-subnet-group

  DocumentDBParameterGroup:
    Type: AWS::DocDB::DBClusterParameterGroup
    Properties:
      Description: WealthWise DocumentDB parameter group
      Family: docdb5.0
      Parameters:
        tls: enabled
        audit_logs: disabled
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-documentdb-params

  DocumentDBCluster:
    Type: AWS::DocDB::DBCluster
    Properties:
      DBClusterIdentifier: !Sub ${EnvironmentName}-wealthwise
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DocumentDBSubnetGroup
      DBClusterParameterGroupName: !Ref DocumentDBParameterGroup
      VpcSecurityGroupIds:
        - !Ref DocumentDBSecurityGroup
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      PreferredBackupWindow: 03:00-04:00
      PreferredMaintenanceWindow: sun:04:00-sun:05:00
      DeletionProtection: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-wealthwise-cluster

  DocumentDBInstance1:
    Type: AWS::DocDB::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DocumentDBCluster
      DBInstanceIdentifier: !Sub ${EnvironmentName}-wealthwise-1
      DBInstanceClass: !Ref InstanceClass
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-wealthwise-instance-1

  DocumentDBInstance2:
    Type: AWS::DocDB::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DocumentDBCluster
      DBInstanceIdentifier: !Sub ${EnvironmentName}-wealthwise-2
      DBInstanceClass: !Ref InstanceClass
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-wealthwise-instance-2

Outputs:
  ClusterEndpoint:
    Description: DocumentDB cluster endpoint
    Value: !GetAtt DocumentDBCluster.Endpoint

  ClusterPort:
    Description: DocumentDB cluster port
    Value: !GetAtt DocumentDBCluster.Port

  ClusterReadEndpoint:
    Description: DocumentDB read endpoint
    Value: !GetAtt DocumentDBCluster.ReadEndpoint

  ConnectionString:
    Description: MongoDB connection string (add database name and auth source)
    Value: !Sub
      - 'mongodb://${MasterUsername}:<password>@${Endpoint}:${Port}/wealthwise?tls=true&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false'
      - Endpoint: !GetAtt DocumentDBCluster.Endpoint
        Port: !GetAtt DocumentDBCluster.Port

  SecurityGroupId:
    Description: DocumentDB security group ID
    Value: !Ref DocumentDBSecurityGroup
