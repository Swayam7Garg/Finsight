AWSTemplateFormatVersion: '2010-09-09'
Description: WealthWise ECR repositories with lifecycle policies and image scanning

Parameters:
  EnvironmentName:
    Type: String
    Default: production

Resources:
  APIRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: wealthwise-api
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPatternList": ["*"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Expire untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: wealthwise-api

  WebRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: wealthwise-web
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPatternList": ["*"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Expire untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: wealthwise-web

Outputs:
  APIRepositoryUri:
    Description: API ECR repository URI
    Value: !GetAtt APIRepository.RepositoryUri
    Export:
      Name: !Sub ${EnvironmentName}-APIRepositoryUri

  WebRepositoryUri:
    Description: Web ECR repository URI
    Value: !GetAtt WebRepository.RepositoryUri
    Export:
      Name: !Sub ${EnvironmentName}-WebRepositoryUri

  APIRepositoryArn:
    Description: API ECR repository ARN
    Value: !GetAtt APIRepository.Arn

  WebRepositoryArn:
    Description: Web ECR repository ARN
    Value: !GetAtt WebRepository.Arn
