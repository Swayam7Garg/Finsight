AWSTemplateFormatVersion: '2010-09-09'
Description: WealthWise Secrets Manager secrets and IAM policy for ECS access

Parameters:
  EnvironmentName:
    Type: String
    Default: production

Resources:
  JWTSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: wealthwise/jwt-secret
      Description: JWT signing secret for WealthWise API
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  JWTRefreshSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: wealthwise/jwt-refresh-secret
      Description: JWT refresh token signing secret for WealthWise API
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  MongoDBURISecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: wealthwise/mongodb-uri
      Description: MongoDB/DocumentDB connection string
      SecretString: 'REPLACE_WITH_DOCUMENTDB_CONNECTION_STRING'
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  NextAuthSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: wealthwise/nextauth-secret
      Description: NextAuth.js session encryption secret
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ECS Task Execution Role
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-wealthwise-ecs-execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref JWTSecret
                  - !Ref JWTRefreshSecret
                  - !Ref MongoDBURISecret
                  - !Ref NextAuthSecret

  # ECS Task Role (for application-level AWS access)
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-wealthwise-ecs-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ECSExecAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: '*'

Outputs:
  JWTSecretArn:
    Description: JWT secret ARN
    Value: !Ref JWTSecret

  JWTRefreshSecretArn:
    Description: JWT refresh secret ARN
    Value: !Ref JWTRefreshSecret

  MongoDBURISecretArn:
    Description: MongoDB URI secret ARN
    Value: !Ref MongoDBURISecret

  NextAuthSecretArn:
    Description: NextAuth secret ARN
    Value: !Ref NextAuthSecret

  ExecutionRoleArn:
    Description: ECS task execution role ARN
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub ${EnvironmentName}-ExecutionRoleArn

  TaskRoleArn:
    Description: ECS task role ARN
    Value: !GetAtt ECSTaskRole.Arn
    Export:
      Name: !Sub ${EnvironmentName}-TaskRoleArn
