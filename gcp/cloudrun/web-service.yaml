apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: wealthwise-web
  labels:
    app: wealthwise-web
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "8"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/wealthwise-web/web:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nextauth-secret
            - name: NEXTAUTH_URL
              value: "${NEXTAUTH_URL}"
            - name: NEXT_PUBLIC_API_URL
              value: "${NEXT_PUBLIC_API_URL}"
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
