apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: wealthwise-api
  labels:
    app: wealthwise-api
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
    run.googleapis.com/vpc-access-connector: projects/${PROJECT_ID}/locations/${REGION}/connectors/wealthwise-connector
    run.googleapis.com/vpc-access-egress: private-ranges-only
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: wealthwise-api@${PROJECT_ID}.iam.gserviceaccount.com
      containers:
        - image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/wealthwise-api/api:latest
          ports:
            - containerPort: 4000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: "4000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: jwt-refresh-secret
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: mongodb-uri
          startupProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            periodSeconds: 10
            failureThreshold: 3
