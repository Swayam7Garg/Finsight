steps:
  # Build API image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'apps/api/Dockerfile.prod'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/finsight-api/api:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/finsight-api/api:latest'
      - '.'

  # Build Web image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'apps/web/Dockerfile.prod'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/finsight-web/web:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/finsight-web/web:latest'
      - '.'

  # Push API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/finsight-api/api']

  # Push Web image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/finsight-web/web']

  # Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'finsight-api'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/finsight-api/api:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--quiet'

  # Deploy Web to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'finsight-web'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/finsight-web/web:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--quiet'

  # Smoke test
  - name: 'gcr.io/cloud-builders/curl'
    entrypoint: bash
    args:
      - '-c'
      - |
        API_URL=$(gcloud run services describe finsight-api --region=${_REGION} --format='value(status.url)')
        curl --fail --silent --max-time 10 "$${API_URL}/api/health" || exit 1
        echo "Smoke test passed!"

substitutions:
  _REGION: us-central1

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/finsight-api/api:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/finsight-web/web:${SHORT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
