# Active and preview services for the FinSight Web blue-green rollout.
#
# In a blue-green deployment:
#   active  → stable, receives 100% of production traffic at all times
#   preview → new version, receives no traffic until manually/auto promoted
#
# The Ingress should point to `finsight-web-active`.
# Engineers can preview the new version via `finsight-web-preview` before promotion.
#
# Apply before the Rollout resource:
#   kubectl apply -f web-services.yaml -n finsight-production
---
# Active (blue) service — receives 100% production traffic.
apiVersion: v1
kind: Service
metadata:
  name: finsight-web-active
  namespace: finsight-production
  labels:
    app.kubernetes.io/name: finsight-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: finsight
    app.kubernetes.io/managed-by: argo-rollouts
    finsight.io/service-type: active
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/name: finsight-web

---
# Preview (green) service — new version, zero production traffic.
# Use this for smoke-testing before promotion:
#   kubectl port-forward svc/finsight-web-preview 8080:3000 -n finsight-production
apiVersion: v1
kind: Service
metadata:
  name: finsight-web-preview
  namespace: finsight-production
  labels:
    app.kubernetes.io/name: finsight-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: finsight
    app.kubernetes.io/managed-by: argo-rollouts
    finsight.io/service-type: preview
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/name: finsight-web
