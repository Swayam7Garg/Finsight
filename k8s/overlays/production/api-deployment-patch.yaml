apiVersion: apps/v1
kind: Deployment
metadata:
  name: finsight-api
  namespace: finsight
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
