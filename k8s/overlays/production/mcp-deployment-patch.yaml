apiVersion: apps/v1
kind: Deployment
metadata:
  name: finsight-mcp
  namespace: finsight
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: mcp
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
