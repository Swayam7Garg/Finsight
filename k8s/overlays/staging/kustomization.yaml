apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wealthwise

resources:
  - ../../base

patches:
  - target:
      kind: Ingress
      name: wealthwise-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: staging.wealthwise.example.com
      - op: replace
        path: /spec/rules/0/host
        value: staging.wealthwise.example.com
