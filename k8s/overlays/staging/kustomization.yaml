apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: finsight

resources:
  - ../../base

patches:
  - target:
      kind: Ingress
      name: finsight-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: staging.finsight.example.com
      - op: replace
        path: /spec/rules/0/host
        value: staging.finsight.example.com
