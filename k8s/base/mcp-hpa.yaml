apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finsight-mcp-hpa
  namespace: finsight
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finsight-mcp
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
