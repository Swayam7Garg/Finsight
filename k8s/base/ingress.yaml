apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finsight-ingress
  namespace: finsight
  labels:
    app.kubernetes.io/part-of: finsight
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "10"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - finsight.example.com
      secretName: finsight-tls
  rules:
    - host: finsight.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: finsight-api
                port:
                  number: 4000
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: finsight-mcp
                port:
                  number: 5100
          - path: /agent
            pathType: Prefix
            backend:
              service:
                name: finsight-agentic-ai
                port:
                  number: 5200
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finsight-web
                port:
                  number: 3000
