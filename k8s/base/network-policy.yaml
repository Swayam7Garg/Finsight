apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: finsight
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: finsight
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: finsight-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: finsight-web
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 4000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress-mongodb
  namespace: finsight
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: finsight-api
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 27017
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
---
# MCP: accept traffic from agentic-ai and ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-ingress
  namespace: finsight
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: finsight-mcp
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: finsight-agentic-ai
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5100
---
# MCP: egress to MongoDB + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-egress-mongodb
  namespace: finsight
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: finsight-mcp
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 27017
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
---
# Agentic AI: accept traffic from ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agentic-ai-ingress
  namespace: finsight
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: finsight-agentic-ai
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5200
---
# Agentic AI: egress to MCP, Anthropic API (HTTPS), DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agentic-ai-egress
  namespace: finsight
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: finsight-agentic-ai
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: finsight-mcp
      ports:
        - protocol: TCP
          port: 5100
    - ports:
        - protocol: TCP
          port: 443
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-ingress
  namespace: finsight
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: finsight-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-egress-api
  namespace: finsight
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: finsight-web
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: finsight-api
      ports:
        - protocol: TCP
          port: 4000
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
