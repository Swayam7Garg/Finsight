apiVersion: v1
kind: Service
metadata:
  name: {{ include "finsight.fullname" . }}-api
  namespace: {{ include "finsight.namespace" . }}
  labels:
    {{- include "finsight.api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      protocol: TCP
  selector:
    {{- include "finsight.api.selectorLabels" . | nindent 4 }}
