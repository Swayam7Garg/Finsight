{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "finsight.fullname" . }}-mcp
  namespace: {{ include "finsight.namespace" . }}
  labels:
    {{- include "finsight.mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - port: {{ .Values.mcp.port }}
      targetPort: {{ .Values.mcp.port }}
      protocol: TCP
  selector:
    {{- include "finsight.mcp.selectorLabels" . | nindent 4 }}
{{- end }}
