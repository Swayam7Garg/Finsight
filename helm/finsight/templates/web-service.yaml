apiVersion: v1
kind: Service
metadata:
  name: {{ include "finsight.fullname" . }}-web
  namespace: {{ include "finsight.namespace" . }}
  labels:
    {{- include "finsight.web.labels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.port }}
      targetPort: {{ .Values.web.port }}
      protocol: TCP
  selector:
    {{- include "finsight.web.selectorLabels" . | nindent 4 }}
