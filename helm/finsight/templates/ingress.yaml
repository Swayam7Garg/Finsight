{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "finsight.fullname" . }}-ingress
  namespace: {{ include "finsight.namespace" . }}
  labels:
    {{- include "finsight.commonLabels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "finsight.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: {{ include "finsight.fullname" . }}-mcp
                port:
                  number: {{ .Values.mcp.port }}
          - path: /agent
            pathType: Prefix
            backend:
              service:
                name: {{ include "finsight.fullname" . }}-agentic-ai
                port:
                  number: {{ .Values.agenticAi.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "finsight.fullname" . }}-web
                port:
                  number: {{ .Values.web.port }}
{{- end }}
