{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "finsight.fullname" . }}-allow-mcp-egress
  namespace: {{ include "finsight.namespace" . }}
  labels:
    {{- include "finsight.commonLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "finsight.mcp.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicies.mongodbPort }}
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
{{- end }}
