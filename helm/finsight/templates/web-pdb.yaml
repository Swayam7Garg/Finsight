{{- if .Values.web.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "finsight.fullname" . }}-web-pdb
  namespace: {{ include "finsight.namespace" . }}
  labels:
    {{- include "finsight.web.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.web.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "finsight.web.selectorLabels" . | nindent 6 }}
{{- end }}
