{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wealthwise.fullname" . }}-default-deny
  namespace: {{ include "wealthwise.namespace" . }}
  labels:
    {{- include "wealthwise.commonLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
{{- end }}
