{{- if .Values.api.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "wealthwise.fullname" . }}-api-pdb
  namespace: {{ include "wealthwise.namespace" . }}
  labels:
    {{- include "wealthwise.api.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.api.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "wealthwise.api.selectorLabels" . | nindent 6 }}
{{- end }}
