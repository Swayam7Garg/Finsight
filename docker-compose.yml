version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: finsight-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=finsight
    networks:
      - finsight-network

  api:
    build:
      context: ./backend
      dockerfile: finsight-api/Dockerfile
    container_name: finsight-api
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/finsight
      - JWT_SECRET=${JWT_SECRET:-finsight-dev-jwt-secret-change-in-prod-32chars}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-finsight-dev-refresh-secret-change-in-prod}
      - API_PORT=4000
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - finsight-network
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finsight-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-finsight-dev-nextauth-secret}
      - API_URL=http://api:4000/api/v1
    depends_on:
      - api
    networks:
      - finsight-network
    restart: unless-stopped

  mcp:
    build:
      context: ./backend
      dockerfile: finsight-mcp/Dockerfile
    container_name: finsight-mcp
    ports:
      - "5100:5100"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/finsight
      - JWT_SECRET=${JWT_SECRET:-finsight-dev-jwt-secret-change-in-prod-32chars}
      - MCP_TRANSPORT=sse
      - MCP_PORT=5100
    depends_on:
      - mongodb
    networks:
      - finsight-network
    restart: unless-stopped

  agentic-ai:
    build:
      context: ./backend
      dockerfile: finsight-agentic/Dockerfile
    container_name: finsight-agentic-ai
    ports:
      - "5200:5200"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_SERVER_URL=http://mcp:5100
      - JWT_SECRET=${JWT_SECRET:-finsight-dev-jwt-secret-change-in-prod-32chars}
      - AGENT_PORT=5200
    depends_on:
      - mcp
    networks:
      - finsight-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  finsight-network:
    driver: bridge
